name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-linux:
    name: Linux (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config build-essential

      - name: install wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: build
        run: wails build -clean -trimpath -tags webkit2_41 -ldflags "-s -w"

      - name: package
        run: tar -czf skill-manager-linux-amd64.tar.gz -C build/bin skill-manager

      - uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: skill-manager-linux-amd64.tar.gz

  build-macos-intel:
    name: macOS (amd64)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: install wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: build
        run: wails build -clean -trimpath -platform darwin/amd64 -ldflags "-s -w"

      - name: package
        run: ditto -c -k --keepParent build/bin/skill-manager.app skill-manager-darwin-amd64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: darwin-amd64
          path: skill-manager-darwin-amd64.zip

  build-macos-arm:
    name: macOS (arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: install wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: build
        run: wails build -clean -trimpath -platform darwin/arm64 -ldflags "-s -w"

      - name: package
        run: ditto -c -k --keepParent build/bin/skill-manager.app skill-manager-darwin-arm64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64
          path: skill-manager-darwin-arm64.zip

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos-intel, build-macos-arm]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            skill-manager-linux-amd64.tar.gz
            skill-manager-darwin-amd64.zip
            skill-manager-darwin-arm64.zip
